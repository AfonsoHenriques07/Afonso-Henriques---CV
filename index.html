<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afonso Henriques — CV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --text: #1a1a18;
    --muted: #6b6b65;
    --border: #e0ddd6;
    --accent: #c1440e;
    --accent-light: #f5ede8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
  }

  /* lang toggle */
  .lang-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 2rem;
    gap: 4px;
  }
  .lang-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    transition: all 0.2s;
  }
  .lang-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .lang-btn:not(.active):hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* header */
  .header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2rem;
    align-items: start;
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
  .name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 6vw, 52px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 0.75rem;
  }
  .contacts {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 18px;
    margin-top: 0.5rem;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--muted);
  }
  .contact-item a { color: var(--accent); text-decoration: none; }
  .contact-item a:hover { text-decoration: underline; }
  .contact-icon { font-size: 13px; }
  .avatar-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--accent-light);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--accent);
    flex-shrink: 0;
  }

  /* sections */
  .section { margin-bottom: 2rem; }
  .section-title {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* entry */
  .entry {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0 1rem;
    margin-bottom: 1.25rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .entry-role {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .entry-org {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .entry-date {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    text-align: right;
    padding-top: 2px;
  }
  .entry-bullets {
    grid-column: 1 / -1;
    padding-left: 1rem;
    margin-top: 4px;
  }
  .entry-bullets li {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 3px;
    list-style: none;
    position: relative;
  }
  .entry-bullets li::before {
    content: '—';
    position: absolute;
    left: -1rem;
    color: var(--border);
  }

  /* skills */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }
  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .skill-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 3px;
  }
  .skill-value { font-size: 13px; color: var(--text); }

  /* languages */
  .langs { display: flex; gap: 10px; flex-wrap: wrap; }
  .lang-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
  }
  .lang-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .lang-level { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* fade transition */
  #cv-body { transition: opacity 0.18s ease; }
  #cv-body.fade { opacity: 0; }

  @media (max-width: 500px) {
    .header { grid-template-columns: 1fr; }
    .avatar-circle { display: none; }
    .entry { grid-template-columns: 1fr; }
    .entry-date { text-align: left; }
  }
</style>
</head>

        { label: "Microcontroladores", value: "Arduino, Micro:Bit, ESP32" }
      ]
    },
    languages: {
      title: "Idiomas",
      items: [
        { name: "Português", level: "Língua materna" },
        { name: "Inglês", level: "Proficiência profissional plena" }
      ]
    }
  }
};

function renderEntries(items) {
  return items.map(item => `
    <div class="entry">
      <div class="entry-role">${item.role}</div>
      <div class="entry-date">${item.date}</div>
      <div class="entry-org">${item.org}</div>
      <ul class="entry-bullets">${item.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
    </div>
  `).join('');
}

function render(lang) {
  const d = cv[lang];
  return `
    <div class="section">
      <div class="section-title">${d.experience.title}</div>
      ${renderEntries(d.experience.items)}
    </div>
    <div class="section">
      <div class="section-title">${d.education.title}</div>
      ${renderEntries(d.education.items)}
    </div>
    <div class="section">
      <div class="section-title">${d.skills.title}</div>
      <div class="skills-grid">
        ${d.skills.items.map(s => `<div class="skill-card"><div class="skill-label">${s.label}</div><div class="skill-value">${s.value}</div></div>`).join('')}
      </div>
    </div>
    <div class="section">
      <div class="section-title">${d.languages.title}</div>
      <div class="langs">
        ${d.languages.items.map(l => `<div class="lang-card"><div class="lang-name">${l.name}</div><div class="lang-level">${l.level}</div></div>`).join('')}
      </div>
    </div>
  `;
}

let currentLang = 'en';

function switchLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-pt').classList.toggle('active', lang === 'pt');
  const body = document.getElementById('cv-body');
  body.classList.add('fade');
  setTimeout(() => {
    body.innerHTML = render(lang);
    body.classList.remove('fade');
  }, 180);
  document.documentElement.lang = lang;
}

document.getElementById('cv-body').innerHTML = render('en');
</script>
</body>
</html>
